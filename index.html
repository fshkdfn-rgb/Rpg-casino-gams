<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RPG: Farm & Loot</title>
    <style>
        :root {
            --bg: #1a1a2e;
            --panel: #16213e;
            --gold: #e2b04a;
            --hp: #e74c3c;
            --mana: #3498db;
            --exp: #2ecc71;
            --text: #e0e0e0;
            --button: #0f3460;
            --button-hover: #1a508b;
            --rare: #9b59b6;
            --epic: #e67e22;
            --legendary: #f1c40f;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            user-select: none;
        }

        .game-container {
            width: 100%;
            max-width: 900px;
            background: var(--panel);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        /* Шапка с ресурсами */
        .resources {
            grid-column: 1 / -1;
            display: flex;
            gap: 20px;
            justify-content: space-around;
            flex-wrap: wrap;
        }

        .resource-item {
            text-align: center;
            background: rgba(0, 0, 0, 0.3);
            padding: 12px 20px;
            border-radius: 12px;
            min-width: 100px;
        }

        .resource-label {
            font-size: 0.8em;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #888;
        }

        .resource-value {
            font-size: 1.5em;
            font-weight: bold;
        }

        .gold-value {
            color: var(--gold);
        }
        .level-value {
            color: #fff;
        }
        .exp-value {
            color: var(--exp);
        }

        /* Панель персонажа */
        .character-panel,
        .monster-panel {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
        }

        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            margin: 0 auto 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
            background: rgba(255, 255, 255, 0.05);
            border: 3px solid rgba(255, 255, 255, 0.1);
        }

        .hp-bar,
        .mana-bar,
        .exp-bar {
            height: 8px;
            border-radius: 4px;
            margin: 6px 0;
            background: rgba(255, 255, 255, 0.1);
            overflow: hidden;
        }

        .hp-fill {
            background: var(--hp);
            height: 100%;
            transition: width 0.3s;
        }
        .mana-fill {
            background: var(--mana);
            height: 100%;
            transition: width 0.3s;
        }
        .exp-fill {
            background: var(--exp);
            height: 100%;
            transition: width 0.3s;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            font-size: 0.9em;
            margin: 4px 0;
            color: #aaa;
        }

        .equipment-slots {
            margin-top: 10px;
            display: flex;
            gap: 8px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .equip-slot {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .equip-slot:hover {
            border-color: var(--gold);
        }
        .equip-slot.equipped {
            border-color: var(--gold);
            background: rgba(226, 176, 74, 0.2);
        }

        /* Кнопки действий */
        .actions {
            grid-column: 1 / -1;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 25px;
            font-size: 1em;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
            letter-spacing: 0.5px;
            position: relative;
            overflow: hidden;
        }

        .btn:active {
            transform: scale(0.95);
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-attack {
            background: var(--hp);
            color: white;
        }
        .btn-attack:hover:not(:disabled) {
            background: #c0392b;
        }

        .btn-skill {
            background: var(--mana);
            color: white;
        }
        .btn-skill:hover:not(:disabled) {
            background: #2980b9;
        }

        .btn-lootbox {
            background: linear-gradient(135deg, #9b59b6, #e67e22);
            color: white;
        }
        .btn-lootbox:hover:not(:disabled) {
            background: linear-gradient(135deg, #8e44ad, #d35400);
        }

        .btn-heal {
            background: #27ae60;
            color: white;
        }
        .btn-heal:hover:not(:disabled) {
            background: #219a52;
        }

        .btn-location {
            background: #7f8c8d;
            color: white;
        }
        .btn-location:hover:not(:disabled) {
            background: #6c7a7a;
        }
        .btn-location.active-location {
            background: #f39c12;
            box-shadow: 0 0 15px rgba(243, 156, 18, 0.5);
        }

        /* Лог */
        .log {
            grid-column: 1 / -1;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 12px;
            padding: 15px;
            max-height: 120px;
            overflow-y: auto;
            font-size: 0.85em;
            color: #bbb;
            line-height: 1.5;
        }

        .log .damage {
            color: #e74c3c;
        }
        .log .heal {
            color: #2ecc71;
        }
        .log .gold-text {
            color: #f1c40f;
        }
        .log .loot {
            color: #9b59b6;
        }
        .log .level-up {
            color: #f39c12;
            font-weight: bold;
            font-size: 1.1em;
        }

        /* Локации */
        .locations {
            grid-column: 1 / -1;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .location-btn {
            padding: 8px 16px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            background: rgba(255, 255, 255, 0.05);
            color: #aaa;
            cursor: pointer;
            font-size: 0.85em;
            transition: all 0.2s;
        }

        .location-btn.unlocked {
            color: #fff;
            border-color: rgba(255, 255, 255, 0.6);
        }
        .location-btn.current {
            background: #f39c12;
            border-color: #f39c12;
            color: #000;
            font-weight: bold;
        }
        .location-btn.locked {
            opacity: 0.4;
            cursor: not-allowed;
        }

        /* Лутбокс попап */
        .lootbox-popup {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .lootbox-popup.show {
            display: flex;
        }

        .lootbox-content {
            background: var(--panel);
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            animation: popIn 0.4s ease-out;
        }

        @keyframes popIn {
            from {
                transform: scale(0.5);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .loot-item {
            font-size: 60px;
            animation: bounce 0.6s ease-in-out;
        }

        @keyframes bounce {
            0%,
            100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-30px);
            }
        }

        .rarity-common {
            color: #aaa;
        }
        .rarity-rare {
            color: #9b59b6;
        }
        .rarity-epic {
            color: #e67e22;
        }
        .rarity-legendary {
            color: #f1c40f;
        }

        .floating-damage {
            position: absolute;
            animation: floatUp 0.8s ease-out forwards;
            pointer-events: none;
            font-weight: bold;
            font-size: 1.2em;
        }

        @keyframes floatUp {
            0% {
                opacity: 1;
                transform: translateY(0);
            }
            100% {
                opacity: 0;
                transform: translateY(-40px);
            }
        }

        /* Адаптив */
        @media (max-width: 600px) {
            .game-container {
                grid-template-columns: 1fr;
                padding: 15px;
                gap: 12px;
            }
            .avatar {
                width: 80px;
                height: 80px;
                font-size: 40px;
            }
            .btn {
                padding: 10px 16px;
                font-size: 0.85em;
            }
        }

        /* Стили для способностей */
        .skill-cooldown {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 3px;
            background: #fff;
            transition: width 0.1s;
        }
    </style>
</head>

            { name: 'Корона мудрости', type: 'helmet', emoji: '👑', hpBonus: 40, atkBonus: 10, rarity: 'epic',
            chance: 0.04 },
            { name: 'Шлем небес', type: 'helmet', emoji: '👑', hpBonus: 70, atkBonus: 18, rarity: 'legendary', chance: 0.01 },
            { name: 'Кольцо силы', type: 'ring', emoji: '💍', atkBonus: 5, rarity: 'common', chance: 0.25 },
            { name: 'Кольцо защиты', type: 'ring', emoji: '💍', hpBonus: 20, rarity: 'rare', chance: 0.12 },
            { name: 'Кольцо вампира', type: 'ring', emoji: '💍', atkBonus: 12, hpBonus: 15, rarity: 'epic', chance: 0.05 },
            { name: 'Кольцо всевластия', type: 'ring', emoji: '💎', atkBonus: 20, hpBonus: 40, rarity: 'legendary',
                chance: 0.01 },
            { name: 'Зелье здоровья', type: 'potion', emoji: '🧪', rarity: 'common', chance: 0.20 },
        ];

        // ==================== ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ====================

        function getHeroAtk() {
            let bonus = 0;
            Object.values(gameState.hero.equipment).forEach(item => {
                if (item && item.atkBonus) bonus += item.atkBonus;
            });
            return gameState.hero.baseAtk + Math.floor(gameState.hero.level * 2) + bonus;
        }

        function getHeroMaxHp() {
            let bonus = 0;
            Object.values(gameState.hero.equipment).forEach(item => {
                if (item && item.hpBonus) bonus += item.hpBonus;
            });
            return 100 + (gameState.hero.level - 1) * 30 + bonus;
        }

        function getHeroMaxMana() {
            return 50 + (gameState.hero.level - 1) * 10;
        }

        function getEquipBonusText() {
            let atk = 0;
            let hp = 0;
            Object.values(gameState.hero.equipment).forEach(item => {
                if (item) {
                    if (item.atkBonus) atk += item.atkBonus;
                    if (item.hpBonus) hp += item.hpBonus;
                }
            });
            return `+${atk} атаки, +${hp} HP`;
        }

        function spawnMonster() {
            const loc = locations[gameState.currentLocationIndex];
            const monsterList = monsterTypes[gameState.currentLocationIndex];
            const randomMonster = monsterList[Math.floor(Math.random() * 19)]; // 0-18 обычные
            const isBoss = Math.random() < 0.15; // 15% шанс на босса

            const level = gameState.currentLocationIndex + 1;
            const baseHp = 20 + level * 25;
            const baseAtk = 4 + level * 3;

            gameState.currentMonster = {
                name: isBoss ? bossNames[gameState.currentLocationIndex] : randomMonster,
                hp: isBoss ? baseHp * 3 : baseHp,
                maxHp: isBoss ? baseHp * 3 : baseHp,
                atk: isBoss ? baseAtk * 2 : baseAtk,
                level: level,
                isBoss: isBoss,
                goldReward: isBoss ? level * 30 : level * 8 + Math.floor(Math.random() * 10),
                expReward: isBoss ? level * 50 : level * 15 + Math.floor(Math.random() * 10),
            };

            addLog(`Появился ${isBoss ? '💀 БОСС: ' : ''}${gameState.currentMonster.name} (ур.${gameState.currentMonster.level})`);
            updateUI();
        }

        function addLog(msg) {
            gameState.logMessages.unshift(msg);
            if (gameState.logMessages.length > 50) gameState.logMessages.pop();
            renderLog();
        }

        function renderLog() {
            const container = document.getElementById('logContainer');
            container.innerHTML = gameState.logMessages.slice(0, 15).map(m => `<div>${m}</div>`).join('');
        }

        function updateUI() {
            const h = gameState.hero;
            const m = gameState.currentMonster;

            // Ресурсы
            document.getElementById('goldDisplay').textContent = gameState.gold;
            document.getElementById('levelDisplay').textContent = h.level;
            document.getElementById('expDisplay').textContent = `${h.exp} / ${h.expToLevel}`;
            document.getElementById('atkDisplay').textContent = getHeroAtk();

            // Герой
            const maxHp = getHeroMaxHp();
            const maxMana = getHeroMaxMana();
            if (h.hp > maxHp) h.hp = maxHp;
            if (h.mana > maxMana) h.mana = maxMana;
            h.maxHp = maxHp;
            h.maxMana = maxMana;

            document.getElementById('heroHpText').textContent = `${h.hp}/${maxHp}`;
            document.getElementById('heroHpBar').style.width = `${(h.hp/maxHp*100)}%`;
            document.getElementById('heroManaText').textContent = `${h.mana}/${maxMana}`;
            document.getElementById('heroManaBar').style.width = `${(h.mana/maxMana*100)}%`;
            document.getElementById('heroExpBar').style.width = `${(h.exp/h.expToLevel*100)}%`;
            document.getElementById('heroName').textContent = `${h.name} (ур.${h.level})`;
            document.getElementById('equipBonus').textContent = getEquipBonusText();

            // Слоты экипировки
            ['weapon', 'armor', 'helmet', 'ring'].forEach(slot => {
                const el = document.getElementById('slot' + slot.charAt(0).toUpperCase() + slot.slice(1));
                if (h.equipment[slot]) {
                    el.classList.add('equipped');
                    el.title = h.equipment[slot].name;
                } else {
                    el.classList.remove('equipped');
                    el.title = slot === 'weapon' ? 'Оружие' : slot === 'armor' ? 'Броня' : slot === 'helmet' ? 'Шлем' :
                        'Кольцо';
                }
            });

            // Монстр
            if (m) {
                document.getElementById('monsterAvatar').textContent = m.isBoss ? '👹' : ['🐺', '👾', '🐉', '👻', '🦇', '🐍',
                    '🕷️', '🦂', '🐊', '🦖'
                ][Math.floor(Math.random() * 10)];
                document.getElementById('monsterName').textContent = m.name + (m.isBoss ? ' 💀' : '');
                document.getElementById('monsterHpText').textContent = `${m.hp}/${m.maxHp}`;
                document.getElementById('monsterHpBar').style.width = `${(m.hp/m.maxHp*100)}%`;
                document.getElementById('monsterLevel').textContent = m.level;
                document.getElementById('monsterAtk').textContent = m.atk;
                document.getElementById('monsterPanel').style.display = '';
            } else {
                document.getElementById('monsterPanel').style.display = 'none';
            }

            // Кнопки способностей
            document.getElementById('btnSkill1').textContent =
                `${h.skills[0].emoji} ${h.skills[0].name} (${h.skills[0].manaCost} маны)${h.skills[0].cooldown > 0 ? ' [КД:'+h.skills[0].cooldown+']' : ''}`;
            document.getElementById('btnSkill2').textContent =
                `${h.skills[1].emoji} ${h.skills[1].name} (${h.skills[1].manaCost} маны)${h.skills[1].cooldown > 0 ? ' [КД:'+h.skills[1].cooldown+']' : ''}`;

            document.getElementById('btnSkill1').disabled = h.skills[0].cooldown > 0 || h.mana < h.skills[0].manaCost || !
                m;
            document.getElementById('btnSkill2').disabled = h.skills[1].cooldown > 0 || h.mana < h.skills[1].manaCost || !
                m;
            document.getElementById('btnAttack').disabled = !m;
            document.getElementById('btnHeal').disabled = h.potions <= 0 || h.hp >= maxHp;

            // Кнопка лутбокса
            document.getElementById('btnLootbox').textContent = `🎁 Лутбокс (50💰)`;
            document.getElementById('btnLootbox').disabled = gameState.gold < 50;

            // Локации
            renderLocations();

            // Сохранение
            saveGame();
        }

        function renderLocations() {
            const container = document.getElementById('locationsContainer');
            let html = '';
            for (let i = 0; i < locations.length; i++) {
                const unlocked = i <= gameState.currentLocationIndex + 1 || i <= gameState.hero.level;
                const current = i === gameState.currentLocationIndex;
                let cls = 'location-btn';
                if (current) cls += ' current';
                else if (unlocked) cls += ' unlocked';
                else cls += ' locked';

                html +=
                    `<button class="${cls}" onclick="travelTo(${i})" ${!unlocked ? 'disabled' : ''} title="${locations[i].name} (ур.${i+1})">${i+1}. ${locations[i].name.substring(0,12)}${locations[i].name.length>12?'…':''}</button>`;
            }
            container.innerHTML = html;
        }

        // ==================== БОЕВЫЕ ДЕЙСТВИЯ ====================

        function attack() {
            if (!gameState.currentMonster) return;
            const m = gameState.currentMonster;
            const atk = getHeroAtk();
            const crit = Math.random() < 0.1;
            const dmg = crit ? Math.floor(atk * 1.8) : atk + Math.floor(Math.random() * 5);

            m.hp -= dmg;
            addLog(`⚔️ Вы нанесли <span class="damage">${dmg} урона</span>${crit ? ' 💥КРИТ!' : ''} по ${m.name}!`);

            if (m.hp <= 0) {
                monsterDefeated();
            } else {
                monsterTurn();
            }
            updateUI();
        }

        function useSkill(index) {
            if (!gameState.currentMonster) return;
            const skill = gameState.hero.skills[index];
            if (skill.cooldown > 0 || gameState.hero.mana < skill.manaCost) return;

            gameState.hero.mana -= skill.manaCost;
            skill.cooldown = skill.maxCooldown;

            const m = gameState.currentMonster;
            m.hp -= skill.damage;

            addLog(`${skill.emoji} Вы использовали <b>${skill.name}</b>! Нанесено <span class="damage">${skill.damage} урона</span>!`);

            if (m.hp <= 0) {
                monsterDefeated();
            } else {
                monsterTurn();
            }
            updateUI();
        }

        function monsterTurn() {
            const m = gameState.currentMonster;
            const h = gameState.hero;
            const dmg = Math.max(1, m.atk + Math.floor(Math.random() * 5) - Math.floor(h.level * 0.5));
            h.hp -= dmg;
            addLog(`💢 ${m.name} атакует! Вы получили <span class="damage">${dmg} урона</span>.`);

            if (h.hp <= 0) {
                h.hp = 0;
                addLog('💀 <b>Вы погибли!</b> Потеряно 20% золота. Возрождение...');
                gameState.gold = Math.floor(gameState.gold * 0.8);
                h.hp = Math.floor(getHeroMaxHp() * 0.5);
                h.mana = Math.floor(getHeroMaxMana() * 0.5);
            }
        }

        function monsterDefeated() {
            const m = gameState.currentMonster;
            gameState.gold += m.goldReward;
            gameState.hero.exp += m.expReward;
            addLog(
                `🎉 ${m.name} повержен! Получено: <span class="gold-text">${m.goldReward}💰</span> и <span class="exp-value">${m.expReward} опыта</span>!`
                );

            // Проверка уровня
            while (gameState.hero.exp >= gameState.hero.expToLevel) {
                gameState.hero.exp -= gameState.hero.expToLevel;
                gameState.hero.level++;
                gameState.hero.expToLevel = Math.floor(gameState.hero.expToLevel * 1.4);
                gameState.hero.hp = getHeroMaxHp();
                gameState.hero.mana = getHeroMaxMana();
                gameState.hero.baseAtk += 3;
                addLog(`<span class="level-up">🎊 УРОВЕНЬ ${gameState.hero.level}! Характеристики увеличены!</span>`);
            }

            gameState.currentMonster = null;
            setTimeout(spawnMonster, 800);
            updateUI();
        }

        function heal() {
            if (gameState.hero.potions <= 0) return;
            gameState.hero.potions--;
            gameState.hero.hp = Math.min(getHeroMaxHp(), gameState.hero.hp + 30);
            addLog('🧪 Вы выпили зелье здоровья! +30 HP');
            updateUI();
        }

        // ==================== ЛУТБОКС ====================

        function openLootbox() {
            if (gameState.gold < 50) return;
            gameState.gold -= 50;

            // Выбор предмета
            const roll = Math.random();
            let cumulative = 0;
            let selectedItem = null;
            for (const item of lootTable) {
                cumulative += item.chance;
                if (roll <= cumulative) {
                    selectedItem = item;
                    break;
                }
            }
            if (!selectedItem) selectedItem = lootTable[0];

            // Применяем предмет
            if (selectedItem.type === 'potion') {
                gameState.hero.potions++;
                addLog(`🎁 Из лутбокса: <span class="loot">${selectedItem.emoji} ${selectedItem.name}</span>!`);
            } else {
                // Авто-экипировка если лучше
                const currentEquip = gameState.hero.equipment[selectedItem.type];
                const currentAtk = currentEquip ? (currentEquip.atkBonus || 0) : 0;
                const currentHp = currentEquip ? (currentEquip.hpBonus || 0) : 0;
                const newAtk = selectedItem.atkBonus || 0;
                const newHp = selectedItem.hpBonus || 0;

                const isBetter = (newAtk + newHp) > (currentAtk + currentHp) || !currentEquip;

                if (isBetter) {
                    gameState.hero.equipment[selectedItem.type] = selectedItem;
                    addLog(
                        `🎁 Из лутбокса: <span class="loot rarity-${selectedItem.rarity}">${selectedItem.emoji} ${selectedItem.name}</span> — <b>Экипировано!</b>`);
                } else {
                    addLog(
                        `🎁 Из лутбокса: <span class="loot rarity-${selectedItem.rarity}">${selectedItem.emoji} ${selectedItem.name}</span> (текущее лучше)`);
                }
            }

            // Попап
            const popup = document.getElementById('lootboxPopup');
            const content = document.getElementById('lootboxContent');
            content.innerHTML = `
            <div class="loot-item rarity-${selectedItem.rarity}">${selectedItem.emoji}</div>
            <h2 style="color:var(--${selectedItem.rarity})">${selectedItem.name}</h2>
            <p style="color:#aaa;">Редкость: ${selectedItem.rarity.toUpperCase()}</p>
            ${selectedItem.atkBonus ? `<p>⚔️ +${selectedItem.atkBonus} к атаке</p>` : ''}
            ${selectedItem.hpBonus ? `<p>❤️ +${selectedItem.hpBonus} к HP</p>` : ''}
            <p style="font-size:0.8em;color:#666;">Нажмите чтобы закрыть</p>
          `;
            popup.classList.add('show');

            updateUI();
        }

        function closeLootboxPopup() {
            document.getElementById('lootboxPopup').classList.remove('show');
        }

        // ==================== ПЕРЕМЕЩЕНИЕ ====================

        function travelTo(index) {
            if (index > gameState.currentLocationIndex + 1 && index > gameState.hero.level) return;
            gameState.currentLocationIndex = index;
            gameState.currentMonster = null;
            addLog(`🗺️ Вы отправились в локацию: <b>${locations[index].name}</b> (уровень ${index+1})`);
            spawnMonster();
            updateUI();
        }

        function travelToNext() {
            const next = gameState.currentLocationIndex + 1;
            if (next < locations.length && (next <= gameState.hero.level || next <= gameState.currentLocationIndex + 1)) {
                travelTo(next);
            } else if (gameState.currentLocationIndex < locations.length - 1) {
                addLog('🔒 Эта локация пока недоступна! Повысьте уровень.');
            } else {
                addLog('🏆 Вы достигли последней локации! Поздравляем!');
            }
        }

        // ==================== СОХРАНЕНИЕ / ЗАГРУЗКА ====================

        function saveGame() {
            const saveData = {
                hero: gameState.hero,
                currentLocationIndex: gameState.currentLocationIndex,
                gold: gameState.gold,
                timestamp: Date.now()
            };
            // Сохраняем монстра отдельно (не сериализуем)
            localStorage.setItem('rpgFarmSave', JSON.stringify(saveData));
        }

        function loadGame() {
            const saved = localStorage.getItem('rpgFarmSave');
            if (saved) {
                try {
                    const data = JSON.parse(saved);
                    gameState.hero = data.hero;
                    gameState.currentLocationIndex = data.currentLocationIndex;
                    gameState.gold = data.gold;
                    gameState.currentMonster = null;
                    addLog('💾 Игра загружена!');
                    return true;
                } catch (e) {
                    console.error('Ошибка загрузки:', e);
                }
            }
            return false;
        }

        function resetGame() {
            if (confirm('Точно сбросить ВЕСЬ прогресс?')) {
                localStorage.removeItem('rpgFarmSave');
                location.reload();
            }
        }

        // ==================== ТАЙМЕР КУЛДАУНОВ ====================

        function tickCooldowns() {
            gameState.hero.skills.forEach(skill => {
                if (skill.cooldown > 0) skill.cooldown--;
            });
            // Регенерация маны
            if (gameState.hero.mana < getHeroMaxMana()) {
                gameState.hero.mana = Math.min(getHeroMaxMana(), gameState.hero.mana + 1);
            }
            updateUI();
        }

        // ==================== ИНИЦИАЛИЗАЦИЯ ====================

        function initGame() {
            // Создаём локации
            for (let i = 0; i < 40; i++) {
                locations.push({
                    name: locationNames[i],
                    level: i + 1,
                    monsterPool: monsterTypes[i],
                    boss: bossNames[i]
                });
            }

            // Пробуем загрузить
            const loaded = loadGame();
            if (!loaded) {
                gameState.currentLocationIndex = 0;
                gameState.gold = 20;
                gameState.hero.potions = 3;
                addLog('🆕 Новая игра! Убейте первого монстра и начинайте фарм!');
            }

            spawnMonster();
            updateUI();

            // Таймеры
            setInterval(tickCooldowns, 1000);

            // Сочетания клавиш
            document.addEventListener('keydown', (e) => {
                switch (e.key.toLowerCase()) {
                    case 'a':
                        attack();
                        break;
                    case '1':
                        useSkill(0);
                        break;
                    case '2':
                        useSkill(1);
                        break;
                    case 'h':
                        heal();
                        break;
                    case 'l':
                        openLootbox();
                        break;
                    case 'n':
                        travelToNext();
                        break;
                }
            });

            // Кнопка сброса (добавляем в DOM)
            const resetBtn = document.createElement('button');
            resetBtn.textContent = '🔄 Сброс';
            resetBtn.style.cssText = `
            position:fixed;bottom:10px;right:10px;padding:8px 16px;
            background:#333;color:#888;border:1px solid #555;border-radius:20px;
            cursor:pointer;font-size:0.8em;z-index:50;
          `;
            resetBtn.onclick = resetGame;
            document.body.appendChild(resetBtn);

            console.log('🎮 RPG Farm & Loot готова!');
            console.log('Управление: A - атака, 1/2 - способности, H - зелье, L - лутбокс, N - следующая локация');
        }

        // Запуск!
        initGame();
    </script>
</body>
</html>
